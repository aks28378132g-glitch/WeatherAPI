<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Async Weather Tracker</h1>

    <div id="search-box">
      <div id="first-search">
        <h3>Search City</h3>
        <form action="">
          <input
            type="text"
            id="search-city"
            placeholder="Delhi,Mumbai etc..."
          />
          <button type="submit">Search</button>
        </form>
      </div>

      <div id="search-history">
        <h3>Search History</h3>
        <div id="search-cities-box"></div>
      </div>
    </div>

    <div id="weather-info-box">
      <h3>Weather Info</h3>
      <div id="fetch-data-box"></div>
    </div>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}
body {
  background: linear-gradient(135deg, #74ebd5, #9face6);
  min-height: 100vh;
  padding: 20px;
  color: #333;
}
h1 {
  text-align: center;
  margin-bottom: 25px;
  color: #222;
}

#search-box {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

#first-search,
#search-history,
#weather-info-box {
  background: #ffffff;
  padding: 20px;
  border-radius: 12px;
  width: 300px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
}
h3 {
  margin-bottom: 15px;
  color: #444;
}
form {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
  transition: 0.3s;
}

input:focus {
  border-color: #6c63ff;
}
button {
  padding: 10px 15px;
  border: none;
  background: #6c63ff;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #574fd6;
}

#weather-info-box {
  margin: 30px auto;
  width: 320px;
  text-align: center;
}
#fetch-data-box div {
  background: #f7f9fc;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  font-size: 14px;
}
#search-cities-box h4 {
  background: #eef1ff;
  padding: 8px;
  border-radius: 6px;
  margin-bottom: 6px;
  font-weight: normal;
}

@media (max-width: 768px) {
  #search-box {
    flex-direction: column;
    align-items: center;
  }

  #weather-info-box {
    width: 100%;
    max-width: 320px;
  }
}
</style>
    <script>let API_KEY = "6ccccfd5c30f20544bfebabc999fe6ce";

let city = document.querySelector("#search-city");
let form = document.querySelector("form");
let weather = document.querySelector("#fetch-data-box");
let searchedcity = document.querySelector("#search-cities-box");
let clearBtn = document.createElement("button");
clearBtn.textContent = "Clear History";
searchedcity.after(clearBtn);

function getCities() {
  return JSON.parse(localStorage.getItem("cities")) || [];
}

function saveCity(newCity) {
  let cities = getCities();

  if (!cities.includes(newCity)) {
    cities.push(newCity);
    localStorage.setItem("cities", JSON.stringify(cities));
  }

  displayCities();
}
function displayCities() {
  let cities = getCities();
  searchedcity.innerHTML = "";

  cities.forEach((c) => {
    let item = document.createElement("h4");
    item.textContent = c;
    item.style.cursor = "pointer";
    item.onclick = () => getweatherinfo(c);

    searchedcity.appendChild(item);
  });
}
async function getweatherinfo(cityName) {
  let response = await fetch(
    `https://api.openweathermap.org/data/2.5/weather?q=${cityName}&appid=${API_KEY}&units=metric`
  );

  let data = await response.json();

  let card = document.createElement("div");
  card.innerHTML = `
    <div>City : ${data.name}, ${data.sys.country}</div>
    <div>Temp : ${data.main.temp} °C</div>
    <div>Weather : ${data.weather[0].main}</div>
    <div>Humidity : ${data.main.humidity}</div>
    <div>Wind : ${data.wind.speed}</div>
  `;

  weather.innerHTML = "";
  weather.append(card);

  saveCity(cityName);
}
form.addEventListener("submit", (e) => {
  e.preventDefault();
  if (city.value.trim() !== "") {
    getweatherinfo(city.value.trim());
    city.value = "";
  }
});
clearBtn.addEventListener("click", () => {
  localStorage.removeItem("cities");
  displayCities();
});

displayCities();
    </script>
  </body>
</html>
